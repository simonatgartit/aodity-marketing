name: Deploy to Netlify

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Netlify
        id: netlify
        run: |
          DEPLOY=$(npx netlify-cli deploy --prod --dir=dist --json)
          echo "$DEPLOY"
          echo "url=$(echo $DEPLOY | jq -r '.url')" >> $GITHUB_OUTPUT
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Smoke test
        run: |
          URL="${{ steps.netlify.outputs.url }}/index.html"
          echo "Testing $URL"
          STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" "$URL")
          echo "HTTP $STATUS"
          [ "$STATUS" = "200" ] || (echo "Smoke test FAILED" && exit 1)
